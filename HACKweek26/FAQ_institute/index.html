<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FAQ Chatbot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 380px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: #4f46e5;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        .chat-messages {
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
            font-size: 14px;
        }

        .user {
            background: #4f46e5;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #e5e7eb;
            color: black;
            margin-right: auto;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #ddd;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .chat-input button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 16px;
            cursor: pointer;
        }

        .chat-input button:hover {
            background: #4338ca;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">
        Institute FAQ Chatbot
    </div>

    <div class="chat-messages" id="messages"></div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask your question..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value.trim();

    if (message === "") return;

    let messagesDiv = document.getElementById("messages");

    messagesDiv.innerHTML += `<div class="message user">${message}</div>`;

    fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: message })
    })
    .then(res => res.json())
    .then(data => {
        messagesDiv.innerHTML += `<div class="message bot">${data.reply}</div>`;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    input.value = "";
}
</script>

</body>
</html>
