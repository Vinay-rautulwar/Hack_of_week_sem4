<!DOCTYPE html>
<html>
<head>
    <title>Health & Wellness Coach</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Personal Health & Wellness Coach</h1>
    <p class="subtitle">On-device AI-powered health insights</p>

    <form method="post">
        <label>Sleep Hours</label>
        <input type="number" step="0.1" name="sleep" required>

        <label>Workout Duration (minutes)</label>
        <input type="number" name="minutes" required>

        <label>Workout Intensity (1–5)</label>
        <input type="number" min="1" max="5" name="intensity" required>

        <label>Stress Level (1–5)</label>
        <input type="number" min="1" max="5" name="stress" required>

        <label>Fitness Goal</label>
        <select name="goal">
            <option value="fat_loss">Fat Loss</option>
            <option value="muscle_gain">Muscle Gain</option>
        </select>

        <button type="submit">Analyze Health</button>
    </form>

    {% if result %}
    <div class="result-card">
        <h2>Health State: {{ result.state }}</h2>
        <p>{{ result.advice }}</p>

        <h3>Health Signals</h3>
        <ul>
            {% for key, value in result.signals.items() %}
                <li><strong>{{ key }}:</strong> {{ value }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
</div>

</body>
</html>
