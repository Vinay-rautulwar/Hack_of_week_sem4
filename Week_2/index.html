<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Query Preprocessing</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffff;
            width: 520px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #333;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 90px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #667eea;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .output {
            margin-top: 25px;
        }

        .output h4 {
            margin-bottom: 10px;
            color: #333;
        }

        .tokens {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .token {
            background: #edf2ff;
            color: #3f51b5;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 13px;
        }

        footer {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Student Query Preprocessor</h2>
    <p class="subtitle">Clean • Normalize • Tokenize student questions</p>

    <form method="POST">
        <textarea name="query" placeholder="Type your question here..."></textarea>
        <button type="submit">Process Query</button>
    </form>

    {% if tokens %}
    <div class="output">
        <h4>Processed Tokens</h4>
        <div class="tokens">
            {% for token in tokens %}
                <div class="token">{{ token }}</div>
            {% endfor %}
        </div>
    </div>
    {% endif %}

    <footer>
        NLP Preprocessing Demo • Flask
    </footer>
</div>

</body>
</html>
